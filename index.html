<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justwrite | 浮生若梦</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- 引入刚刚创建的独立样式文件 -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <!-- 背景 -->
    <div class="watercolor-bg"></div>

    <!-- 头部区域 -->
    <header class="pt-20 pb-12 text-center relative z-10">
        <h1 class="text-4xl md:text-5xl font-semibold mb-4 header-title tracking-widest">浮 生 若 梦</h1>
        <p class="text-gray-500 font-light tracking-wide text-sm md:text-base">生活碎片 · 评论 · 故事</p>
    </header>

    <!-- 文章列表区 -->
    <main class="flex-grow container mx-auto px-4 md:px-8 max-w-3xl relative z-10">
        
        <div class="space-y-12 pb-20">
            <!-- 第一篇文章卡片 -->
            <article class="glass-card p-8 md:p-10 relative overflow-hidden group">
                <div class="flex flex-col md:flex-row md:items-baseline justify-between mb-4">
                    <h2 class="text-2xl font-medium text-gray-800 tracking-wide">Hello World</h2>
                    <time class="text-xs text-gray-400 mt-2 md:mt-0 font-light tracking-wider">2026.07.19</time>
                </div>
                <div class="text-gray-600 font-light leading-relaxed text-justify mb-6 line-clamp-3">
                    测试。第一次搭建博客，网页设计+代码由 Gemini 3.1 Pro 写出...
                </div>
                <div class="text-right">
                    <!-- 指向新建文件夹中的 index.html -->
                    <a href="./posts/test/index.html" class="read-more-btn text-sm font-medium tracking-widest cursor-pointer">阅读全文</a>
                </div>
            </article>

        </div>

    </main>

    <!-- 页脚 -->
    <footer class="py-8 text-center text-xs text-gray-400 relative z-10 mt-auto border-t border-gray-200/30">
        <p>© 2026 Justwrite. 眼中有爱，看什么都浪漫。</p>
    </footer>

</body>
</html>
