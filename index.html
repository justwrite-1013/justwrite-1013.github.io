<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的故事 | 东方意境</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- 引入刚刚创建的独立样式文件 -->
    <link rel="stylesheet" href="./style.css">
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <!-- 背景 -->
    <div class="watercolor-bg"></div>

    <!-- 头部区域 -->
    <header class="pt-20 pb-12 text-center relative z-10">
        <h1 class="text-4xl md:text-5xl font-semibold mb-4 header-title tracking-widest">浮 生 若 梦</h1>
        <p class="text-gray-500 font-light tracking-wide text-sm md:text-base">温柔透明 · 浪漫朦胧 · 故事感</p>
    </header>

    <!-- 文章列表区 -->
    <main class="flex-grow container mx-auto px-4 md:px-8 max-w-3xl relative z-10">
        
        <div class="space-y-12 pb-20">
            <!-- 第一篇文章卡片 -->
            <article class="glass-card p-8 md:p-10 relative overflow-hidden group">
                <div class="flex flex-col md:flex-row md:items-baseline justify-between mb-4">
                    <h2 class="text-2xl font-medium text-gray-800 tracking-wide">初雪与晚风的记忆</h2>
                    <time class="text-xs text-gray-400 mt-2 md:mt-0 font-light tracking-wider">2026.07.19</time>
                </div>
                <div class="text-gray-600 font-light leading-relaxed text-justify mb-6 line-clamp-3">
                    那是今年冬天的第一场雪，下得很安静。我坐在窗前，看着天色一点点暗下来，天际边缘泛起一种近乎透明的蓝白色调。屋内的灯光呈现出低饱和度的暖黄，在玻璃窗上晕染开来，像是某种水彩颜料不经意间滴落在了打湿的画纸上...
                </div>
                <div class="text-right">
                    <!-- 指向新建文件夹中的 index.html -->
                    <a href="./posts/first-snow/index.html" class="read-more-btn text-sm font-medium tracking-widest cursor-pointer">阅读全文</a>
                </div>
            </article>

            <!-- 第二篇文章卡片 (示例) -->
            <article class="glass-card p-8 md:p-10 relative overflow-hidden group">
                <div class="flex flex-col md:flex-row md:items-baseline justify-between mb-4">
                    <h2 class="text-2xl font-medium text-gray-800 tracking-wide">夏日氤氲的光影</h2>
                    <time class="text-xs text-gray-400 mt-2 md:mt-0 font-light tracking-wider">2026.06.12</time>
                </div>
                <div class="text-gray-600 font-light leading-relaxed text-justify mb-6 line-clamp-3">
                    阳光透过树叶的缝隙洒落，在青石板上留下斑驳的光影。空气中弥漫着水汽，带着一丝淡淡的青草香。远处的山峦在雾气中若隐若现，宛如一幅徐徐展开的泼墨山水画...
                </div>
                <div class="text-right">
                    <a href="#" class="read-more-btn text-sm font-medium tracking-widest cursor-pointer">阅读全文</a>
                </div>
            </article>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="py-8 text-center text-xs text-gray-400 relative z-10 mt-auto border-t border-gray-200/30">
        <p>© 2026 我的故事. 逆光之中，皆是风景。</p>
    </footer>

</body>
</html>
